name: IKUUU-Auto-Checkin

on:
  workflow_dispatch:
  schedule:
    # UTC+8 ~ 07:33
    - cron: "33 23 * * *"

jobs:
  checkin:
    name: Checkin
    runs-on: ubuntu-latest
    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      HOST: ${{ secrets.HOST }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Checkin
        id: checkin
        shell: bash
        run: |
          node main.js
