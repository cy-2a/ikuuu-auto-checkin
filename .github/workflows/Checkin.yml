name: IKUUU-Auto-Checkin

on:
  workflow_dispatch:
  schedule:
    # UTC 15:33 -> 北京时间 23:33 (Actions 任务延迟过高，提前一些时间)
    - cron: "33 15 * * *"

jobs:
  checkin:
    name: Checkin
    runs-on: ubuntu-latest
    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      HOST: ${{ secrets.HOST }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # 锁定稳定版本避免 latest 带来的意外 break
          node-version: 20

      - name: Run Checkin Script
        id: checkin
        shell: bash
        run: |
          node main.js
