name: IKUUU-Auto-Checkin

on:
  workflow_dispatch:
  schedule:
    # 北京时间 07:33
    - cron: "33 23 * * *"

jobs:
  checkin:
    runs-on: ubuntu-latest

    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      HOST: ${{ secrets.HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install undici

      - name: Run Checkin
        run: node main.js
