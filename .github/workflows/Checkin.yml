name: IKUUU-Auto-Checkin

on:
  workflow_dispatch:
  schedule:
    # UTC+8 ~ 07:33
    - cron: "33 23 * * *"

jobs:
  checkin:
    name: Checkin
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      HOST: ${{ secrets.HOST }}
      CONCURRENCY: 2  # 降低并发数，减少网络压力
      FETCH_TIMEOUT_MS: 15000
      FETCH_RETRIES: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate configuration
        run: |
          if [ -z "${{ env.ACCOUNTS }}" ]; then
            echo "❌ 未配置 ACCOUNTS 密钥"
            exit 1
          fi
          echo "✅ 配置验证通过"

      - name: Run Checkin Script
        id: checkin
        shell: bash
        run: node main.js

      - name: Send Telegram Notification
        if: ${{ always() && secrets.TELEGRAM_TOKEN && secrets.TELEGRAM_TO }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *iKuuu 自动签到*

            ${{ steps.checkin.outputs.result || '执行失败' }}

            [任务详情](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            状态: ${{ steps.checkin.outputs.success == 'true' && '✅ 成功' || '❌ 失败' }}
