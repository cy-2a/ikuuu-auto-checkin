name: IKUUU-Auto-Checkin

on:
  workflow_dispatch:
  schedule:
    - cron: "33 23 * * *"

jobs:
  checkin:
    name: Checkin
    runs-on: ubuntu-latest
    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      HOST: ${{ secrets.HOST }}
      NODE_OPTIONS: --dns-result-order=ipv4first

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Checkin
        id: checkin
        run: node main.js
